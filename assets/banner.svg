<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 240" width="840" height="240" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="0.55" stop-color="#0c1426"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf7ff"/>
      <stop offset="0.5" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#a78bfa"/>
      <animate attributeName="x1" values="0;0.4;0" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;1.4;1" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="nuc" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#2563eb"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>

  <rect x="0" y="0" width="840" height="240" rx="22" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="239" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- mac traffic lights -->
  <g transform="translate(24,24)">
    <circle cx="0" cy="0" r="6" fill="#ff5f57"/>
    <circle cx="20" cy="0" r="6" fill="#febc2e"/>
    <circle cx="40" cy="0" r="6" fill="#28c840"/>
  </g>

  <!-- ================= atom ================= -->
  <g transform="translate(130,128)">
    <circle cx="0" cy="0" r="70" fill="url(#halo)">
      <animate attributeName="r" values="66;76;66" dur="3.4s" repeatCount="indefinite"/>
    </circle>

    <!-- orbit 1 -->
    <g transform="rotate(0)">
      <g transform="scale(1,0.4)">
        <circle r="54" fill="none" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="1.5"/>
        <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3.2s" repeatCount="indefinite"/>
           <circle cx="54" cy="0" r="5" fill="#22d3ee" filter="url(#soft)"/></g>
      </g>
    </g>
    <!-- orbit 2 -->
    <g transform="rotate(60)">
      <g transform="scale(1,0.4)">
        <circle r="74" fill="none" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1.5"/>
        <g><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4.6s" repeatCount="indefinite"/>
           <circle cx="74" cy="0" r="5" fill="#a78bfa" filter="url(#soft)"/></g>
      </g>
    </g>
    <!-- orbit 3 -->
    <g transform="rotate(120)">
      <g transform="scale(1,0.4)">
        <circle r="94" fill="none" stroke="#f472b6" stroke-opacity="0.45" stroke-width="1.5"/>
        <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
           <circle cx="94" cy="0" r="5" fill="#f472b6" filter="url(#soft)"/></g>
      </g>
    </g>

    <!-- nucleus -->
    <circle cx="0" cy="0" r="15" fill="url(#nuc)"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#eaf7ff" stroke-opacity="0.5" stroke-width="0.8"/>
  </g>

  <!-- ================= text ================= -->
  <g transform="translate(272,96)">
    <text x="0" y="0" font-size="42" font-weight="800" fill="url(#title)" letter-spacing="-0.5">Quantum Atom Lab</text>
    <text x="2" y="34" font-size="16.5" fill="#93a2bd" font-weight="500">Interactive quantum &amp; atomic physics — computed live in your browser.</text>
    <g font-size="12.5" fill="#cfe1ff" font-weight="600">
      <g transform="translate(0,66)"><rect x="-8" y="-15" width="118" height="24" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/><text x="0" y="2">⚛ 119 elements</text></g>
      <g transform="translate(122,66)"><rect x="-8" y="-15" width="132" height="24" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/><text x="0" y="2">🧮 quantum solvers</text></g>
      <g transform="translate(268,66)"><rect x="-8" y="-15" width="118" height="24" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10"/><text x="0" y="2">⚡ zero backend</text></g>
    </g>
    <text x="2" y="118" font-size="12.5" fill="#5e6e8c">Built by sfar2001</text>
  </g>
</svg>
